name: MileQuest
options:
  bundleIdPrefix: com.itpmgroup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/AppConfig.xcconfig
  Release: Config/AppConfig.xcconfig

packages:
  CoreKit:
    path: Packages/CoreKit
  DesignSystem:
    path: Packages/DesignSystem
  GameEngine:
    path: Packages/GameEngine
  TripKit:
    path: Packages/TripKit
  ContentKit:
    path: Packages/ContentKit
  PaywallKit:
    path: Packages/PaywallKit
  RoadBingo:
    path: Packages/Games/RoadBingo
  WouldYouRather:
    path: Packages/Games/WouldYouRather
  Trivia:
    path: Packages/Games/Trivia
  Charades:
    path: Packages/Games/Charades

targets:
  MileQuest:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: CoreKit
      - package: DesignSystem
      - package: GameEngine
      - package: TripKit
      - package: ContentKit
      - package: PaywallKit
      - package: RoadBingo
      - package: WouldYouRather
      - package: Trivia
      - package: Charades
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.itpmgroup.travelgames
        MARKETING_VERSION: $(APP_MARKETING_VERSION)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        # App-target-only distribution signing for archives; SPM resource
        # bundles must stay on default signing (they take no profile).
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER: MileQuest AppStore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: MileQuest
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "The microphone is used for voice games like story recording and 20 Questions."
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  MileQuestUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - App/UITests
    dependencies:
      - target: MileQuest
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MileQuest:
    build:
      targets:
        MileQuest: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MileQuestUITests
    archive:
      config: Release
